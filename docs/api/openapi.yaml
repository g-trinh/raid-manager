openapi: 3.1.0
info:
  title: Raid Manager API
  version: 0.1.0
  description: Backend API for Raid Manager roguelike. Handles run persistence and leaderboard only. Game logic runs client-side in GoDot.

servers:
  - url: /api/v1

paths:
  /runs:
    post:
      summary: Start a new run
      operationId: createRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [player_id]
              properties:
                player_id:
                  type: string
      responses:
        '201':
          description: Run created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunCreatedResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /runs/{id}:
    get:
      summary: Fetch run snapshot (resume)
      operationId: getRun
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Run snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunSnapshot'
        '404':
          $ref: '#/components/responses/NotFound'

  /runs/{id}/snapshot:
    put:
      summary: Save run state snapshot
      description: Called after every inter-raid council. Phase transition is blocked client-side until this returns 200.
      operationId: saveSnapshot
      parameters:
        - $ref: '#/components/parameters/RunId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunSnapshot'
      responses:
        '200':
          description: Snapshot saved
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /runs/{id}/complete:
    post:
      summary: Finalize a run
      description: Called on VICTORY or GAME_OVER. Submits final score to leaderboard.
      operationId: completeRun
      parameters:
        - $ref: '#/components/parameters/RunId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [outcome, final_boss_index, final_attempt_count]
              properties:
                outcome:
                  type: string
                  enum: [victory, game_over]
                final_boss_index:
                  type: integer
                  minimum: 1
                  maximum: 5
                final_attempt_count:
                  type: integer
                  minimum: 0
                  maximum: 5
      responses:
        '200':
          description: Run finalized
        '404':
          $ref: '#/components/responses/NotFound'

  /leaderboard:
    get:
      summary: Get top completed runs
      operationId: getLeaderboard
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Leaderboard entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      $ref: '#/components/schemas/LeaderboardEntry'

components:
  parameters:
    RunId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Invalid request body
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Run not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    RunCreatedResponse:
      type: object
      required: [run_id]
      properties:
        run_id:
          type: string
          format: uuid

    RunSnapshot:
      type: object
      required: [tier, boss_index, attempt_count, consecutive_wipes, rubber_band_active, phase, members, resources]
      properties:
        tier:
          type: integer
          enum: [1]
          description: Hardcoded to 1 for MVP; present for future multi-tier expansion
        boss_index:
          type: integer
          minimum: 1
          maximum: 5
        attempt_count:
          type: integer
          minimum: 0
          maximum: 4
        consecutive_wipes:
          type: integer
          minimum: 0
        rubber_band_active:
          type: boolean
        phase:
          type: string
          enum: [DRAFT, TACTICAL_CHOICE, BOSS_RESOLUTION, DEBRIEF, COUNCIL, VICTORY, GAME_OVER]
        members:
          type: array
          minItems: 8
          maxItems: 8
          items:
            $ref: '#/components/schemas/MemberSnapshot'
        resources:
          type: object
          properties:
            gold:
              type: integer
              minimum: 0
            potions:
              type: integer
              minimum: 0

    MemberSnapshot:
      type: object
      required: [id, skill, reliability, morale, traits]
      properties:
        id:
          type: string
        skill:
          type: number
          minimum: 0.0
          maximum: 1.0
        reliability:
          type: number
          minimum: 0.0
          maximum: 1.0
        morale:
          type: integer
          minimum: 0
          maximum: 100
        traits:
          type: array
          items:
            type: string

    LeaderboardEntry:
      type: object
      properties:
        run_id:
          type: string
          format: uuid
        player_id:
          type: string
        outcome:
          type: string
          enum: [victory, game_over]
        final_boss_index:
          type: integer
        total_wipes:
          type: integer
        completed_at:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
