    <linearGradient id="catExternal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#003A3A"/>
      <stop offset="100%" stop-color="#001E1E"/>
    </linearGradient>
    <linearGradient id="cardActive" x1="0" y1="0" x2="0" y2="1">
