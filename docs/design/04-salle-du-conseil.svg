  <text x="22" y="546" fill="#3A3A4A" font-size="9" font-style="italic">    Flamius + DPS + Sardoche = combinaison non-testée.</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- ORDER REMINDER + DEPENDENCY WARNING     -->
  <!-- ═══════════════════════════════════════ -->
