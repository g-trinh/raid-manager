<?xml version="1.0" encoding="UTF-8"?>
<svg width="390" height="844" viewBox="0 0 390 844" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'Georgia', 'Times New Roman', serif">

  <rect width="390" height="844" fill="#090B12"/>

  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#12152A"/>
      <stop offset="100%" stop-color="#090B12"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0C060"/>
      <stop offset="100%" stop-color="#C8860A"/>
    </linearGradient>
    <!-- Category colors -->
    <linearGradient id="catMember" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3A1A4A"/>
      <stop offset="100%" stop-color="#1E0D2A"/>
