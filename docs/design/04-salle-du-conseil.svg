  <rect y="744" width="390" height="1" fill="#1E2136"/>

  <g opacity="0.4">
    <text x="50" y="774" text-anchor="middle" fill="#6A6A80" font-size="18">⚔</text>
    <text x="50" y="790" text-anchor="middle" fill="#6A6A80" font-size="9">Raid</text>
  </g>
  <g opacity="0.4">
    <text x="130" y="774" text-anchor="middle" fill="#6A6A80" font-size="18">🗺</text>
