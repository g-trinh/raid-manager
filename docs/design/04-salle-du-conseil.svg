    <text x="360" y="790" text-anchor="middle" fill="#6A6A80" font-size="9">Journal</text>
  </g>

  <text x="195" y="836" text-anchor="middle" fill="#1E2030" font-size="8" letter-spacing="2">RAID MANAGER — SALLE DU CONSEIL</text>

